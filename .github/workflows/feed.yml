name: Aggiorna feed USR Campania

on:
  schedule:
    - cron: "0 */2 * * *"   # ogni 2 ore (UTC). Modifica a piacere.
  workflow_dispatch:          # permette di lanciarlo a mano da Actions

permissions:
  contents: write             # serve per ricommittare feed.xml e state.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Genera feed (+ Telegram se configurato)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit aggiornamenti
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml state.json
          git diff --staged --quiet || git commit -m "Aggiorna feed [skip ci]"
          git push
